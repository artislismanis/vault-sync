# Vault Sync server deployment. See docs/deployment.md for the full
# Synology NAS walkthrough.
#
# Default:            docker compose up -d           (external S3 — your MinIO)
# Self-contained:     docker compose --profile bundled-minio up -d
#
# The ./data volume holds only the rebuildable SQLite index; the S3 bucket is
# the complete server state ("back up the bucket = full backup").
services:
  vault-sync:
    image: ghcr.io/artislismanis/vault-sync-server:latest
    env_file: .env
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      # Image has no curl/wget; node fetch does the job.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- optional bundled MinIO (profile: bundled-minio) ----------------------
  minio:
    image: minio/minio
    profiles: [bundled-minio]
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - ./minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 2s
      retries: 12

  minio-init:
    image: minio/mc
    profiles: [bundled-minio]
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing \"local/$$S3_BUCKET\"
      "
