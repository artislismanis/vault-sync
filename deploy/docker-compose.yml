# Vault Sync server deployment. See docs/tutorials/getting-started.md for the full
# Synology walkthrough (SSH, Container Manager, and Portainer variants).
#
# Configuration comes from compose interpolation variables, NOT env_file —
# so it works identically with:
#   - docker compose CLI:   .env file next to this compose file
#   - Portainer:            stack "Environment variables" UI
#   - Container Manager:    project environment settings
#
# Default:            docker compose up -d           (external S3 — your MinIO)
# Self-contained:     docker compose --profile bundled-minio up -d
#
# Volumes are named (no relative host paths — Portainer-safe). vault-sync-data
# holds only the rebuildable SQLite index; the S3 bucket is the complete
# server state ("back up the bucket = full backup").
services:
  vault-sync:
    # Pin VAULT_SYNC_VERSION to a release (e.g. 0.0.4) so upgrades are
    # explicit — Docker does NOT re-pull a cached :latest on redeploy.
    image: ghcr.io/artislismanis/vault-sync-server:${VAULT_SYNC_VERSION:-latest}
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATA_DIR: /data
      S3_ENDPOINT: '${S3_ENDPOINT:?required — S3 endpoint URL (http//nas-ip9000)}'
      S3_REGION: '${S3_REGION:-us-east-1}'
      S3_ACCESS_KEY: '${S3_ACCESS_KEY:?required}'
      S3_SECRET_KEY: '${S3_SECRET_KEY:?required}'
      S3_BUCKET: '${S3_BUCKET:-vault-sync}'
      # Generate with the admin hash-password command (see deploy/.env.example).
      ACCOUNT_PASSWORD_HASH: '${ACCOUNT_PASSWORD_HASH:?required — see .env.example}'
    ports:
      - '${PUBLISH_PORT:-8080}:8080'
    volumes:
      - vault-sync-data:/data
    restart: unless-stopped
    healthcheck:
      # Image has no curl/wget; node fetch does the job.
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- optional bundled MinIO (profile: bundled-minio) ----------------------
  minio:
    image: minio/minio
    profiles: [bundled-minio]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?}
    volumes:
      - minio-data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 2s
      retries: 12

  minio-init:
    image: minio/mc
    profiles: [bundled-minio]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 '${S3_ACCESS_KEY:-}' '${S3_SECRET_KEY:-}' &&
      mc mb --ignore-existing 'local/${S3_BUCKET:-vault-sync}'
      "

volumes:
  vault-sync-data:
  minio-data:
